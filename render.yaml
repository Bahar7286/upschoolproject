# Render Blueprint — https://render.com/docs/blueprint-spec
# Repo kökünden deploy: Render Dashboard → New → Blueprint

services:
  - type: web
    name: historial-go-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    # Not: Render free tier persistent disk desteklemez. UPLOAD_DIR geçici (redeploy sonrası silinir).
    # Kalıcı dosya için paid plan + disk veya S3/Brevo vb. kullanın.
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: historial-go-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      # Deploy sonrasi web URL ile doldurun (scripts/RENDER_BLUEPRINT.md)
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: google/gemma-4-31b-it:free
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: ENVIRONMENT
        value: production
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GOOGLE_ROUTES_API_KEY
        sync: false

  - type: web
    name: historial-go-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      # API URL (ornek: https://historial-go-api.onrender.com) — sonra Manual Deploy
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false

databases:
  - name: historial-go-db
    plan: free
    databaseName: historial_go
    user: historial
